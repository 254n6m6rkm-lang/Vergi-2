<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BatuBahis</title>

<style>
body{margin:0;font-family:Arial;background:#111;color:white;}
.top{background:#0a8f3c;padding:12px;text-align:center;font-weight:bold;}
.container{padding:10px;}
.match{background:#e5e7eb;color:black;margin:8px 0;border-radius:8px;padding:10px;}
.league{background:#374151;color:white;padding:6px;}
.odds{display:flex;gap:5px;margin-top:5px;}
.odd{background:#d1d5db;padding:6px;border-radius:5px;cursor:pointer;}
.panel{background:#020617;padding:10px;margin-top:10px;}
input{width:100%;margin:5px 0;padding:5px;}
button{padding:6px 10px;margin-top:5px;background:#22c55e;border:none;color:white;}
</style>
</head>

<body>

<div class="top">⚽ BatuBahis</div>

<div class="container">

<div class="panel">
<h3>Kullanıcı</h3>
<input id="user" placeholder="Kullanıcı adı">
<button onclick="register()">Kayıt</button>
<button onclick="login()">Giriş</button>
<div id="balance">Bakiye: 0</div>
</div>

<div id="app"></div>

<div class="panel">
<h3>Kupon</h3>
<div id="coupon"></div>
Toplam Oran: <span id="total">0</span><br>
<button onclick="play()">Bahis Yap</button>
</div>

<div class="panel">
<h3>Admin</h3>
<button onclick="addMoney()">+1000 Ekle</button>
</div>

</div>

<script>

let currentUser=null;
let coupon=[];
let totalOdd=1;

function register(){
let u=document.getElementById("user").value;
if(!u) return alert("boş");
localStorage.setItem("user_"+u, JSON.stringify({balance:1000}));
alert("Kayıt OK (1000₺ verildi)");
}

function login(){
let u=document.getElementById("user").value;
let data=localStorage.getItem("user_"+u);
if(!data) return alert("yok");
currentUser=JSON.parse(data);
currentUser.name=u;
updateBalance();
}

function updateBalance(){
document.getElementById("balance").innerText="Bakiye: "+currentUser.balance;
}

function saveUser(){
localStorage.setItem("user_"+currentUser.name, JSON.stringify(currentUser));
}

function addMoney(){
if(!currentUser) return alert("giriş yap");
currentUser.balance+=1000;
saveUser();
updateBalance();
}

const matches=[
{home:"Galatasaray",away:"Fenerbahçe",odds:[1.8,3.2,2.1]},
{home:"Beşiktaş",away:"Trabzonspor",odds:[2.0,3.0,2.0]},
{home:"Başakşehir",away:"Adana Demirspor",odds:[2.2,3.1,1.7]}
];

function render(){
let html="";
html+=`<div class="league">Süper Lig</div>`;
matches.forEach((m,i)=>{
html+=`
<div class="match">
${m.home} vs ${m.away}
<div class="odds">
<div class="odd" onclick="add('${m.home}','1',${m.odds[0]})">1 ${m.odds[0]}</div>
<div class="odd" onclick="add('X','X',${m.odds[1]})">X ${m.odds[1]}</div>
<div class="odd" onclick="add('${m.away}','2',${m.odds[2]})">2 ${m.odds[2]}</div>
</div>
</div>`;
});
document.getElementById("app").innerHTML=html;
}

function add(team,type,odd){
coupon.push({team,type,odd});
totalOdd*=odd;
updateCoupon();
}

function updateCoupon(){
let txt="";
coupon.forEach(c=> txt+=c.team+" ");
document.getElementById("coupon").innerText=txt;
document.getElementById("total").innerText=totalOdd.toFixed(2);
}

function play(){
if(!currentUser) return alert("giriş yap");
if(coupon.length==0) return alert("boş");

let bet=100;
if(currentUser.balance<bet) return alert("bakiye yok");

currentUser.balance-=bet;

let win=Math.random()>0.5;

if(win){
let gain=bet*totalOdd;
currentUser.balance+=gain;
alert("Kazandın "+gain.toFixed(2));
}else{
alert("Kaybettin");
}

coupon=[];
totalOdd=1;
saveUser();
updateBalance();
updateCoupon();
}

render();

</script>

</body>
</html>
