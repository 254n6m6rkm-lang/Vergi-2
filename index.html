<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mart 2026 Bali Turu</title>

<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Bali Turu">

<style>
body{margin:0;font-family:Arial;background:#000;color:#fff}
.container{display:flex;justify-content:center;align-items:center;height:100vh}
.box{background:#1e1e1e;padding:30px;border-radius:20px;width:340px;text-align:center}
select,input,button{width:100%;padding:12px;margin-top:10px;border-radius:10px;border:none;font-size:16px;text-align:center}
button{background:#00c853;color:#fff}
.result{margin-top:15px;font-size:22px;font-weight:bold}
.note{margin-top:8px;color:#ccc}
</style>
</head>
<body>

<div class="container">
<div class="box">
<h2>Mart 2026 Bali Turu</h2>

<select id="currency">
<option value="380">TL</option>
<option value="15500">USD</option>
<option value="16500">EUR</option>
</select>

<input type="text" id="rupi" placeholder="Rupi gir">
<button onclick="hesapla()">Hesapla</button>

<div class="result" id="sonuc">-</div>
<div class="note" id="not"></div>
</div>
</div>

<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}

const input=document.getElementById("rupi");

input.addEventListener("input",function(e){
let val=e.target.value.replace(/\D/g,'');
e.target.value=Number(val).toLocaleString("tr-TR");
});

function hesapla(){
let raw=document.getElementById("rupi").value.replace(/\./g,'');
let rupi=Number(raw);
let kur=Number(document.getElementById("currency").value);
let sonuc=rupi/kur;
let symbol=document.getElementById("currency").selectedOptions[0].text;

document.getElementById("sonuc").innerText=
sonuc.toLocaleString('tr-TR',{maximumFractionDigits:2})+" "+symbol;

let milyon=rupi/1000000;
document.getElementById("not").innerText=
milyon>=1?milyon.toFixed(1)+" milyon rupi":rupi+" rupi";
}
</script>

</body>
</html>
