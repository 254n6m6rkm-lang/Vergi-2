<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BatuBahis</title>

<style>
body{margin:0;font-family:Arial;background:#111;color:white;}
.top{background:#0a8f3c;padding:12px;text-align:center;font-weight:bold;}
.container{display:flex;flex-direction:column;}
.match{background:#e5e7eb;color:black;margin:8px;border-radius:8px;padding:10px;}
.league{background:#374151;color:white;padding:6px;font-size:14px;}
.row{display:flex;justify-content:space-between;}
.odds{display:flex;gap:5px;margin-top:5px;}
.odd{background:#d1d5db;padding:6px;border-radius:5px;cursor:pointer;}
.coupon{position:fixed;bottom:0;width:100%;background:#020617;padding:10px;}
</style>
</head>

<body>

<div class="top">⚽ BatuBahis</div>

<div id="app"></div>

<div class="coupon">
Kupon: <span id="coupon"></span><br>
Toplam Oran: <span id="total">0</span>
<button onclick="play()">Bahis Yap</button>
</div>

<script>

let coupon=[];
let totalOdd=1;

const data=[
{league:"Süper Lig",matches:[
{home:"Galatasaray",away:"Fenerbahçe",odds:[1.8,3.2,2.1]},
{home:"Beşiktaş",away:"Trabzonspor",odds:[2.0,3.0,2.0]},
{home:"Adana Demirspor",away:"Başakşehir",odds:[2.2,3.1,1.7]}
]}
];

function render(){
let html="";
data.forEach(l=>{
html+=`<div class="league">${l.league}</div>`;
l.matches.forEach((m,i)=>{
html+=`
<div class="match">
<div class="row">
<div>${m.home}<br>${m.away}</div>
</div>
<div class="odds">
<div class="odd" onclick="add('${m.home}','1',${m.odds[0]})">1 ${m.odds[0]}</div>
<div class="odd" onclick="add('Beraberlik','X',${m.odds[1]})">X ${m.odds[1]}</div>
<div class="odd" onclick="add('${m.away}','2',${m.odds[2]})">2 ${m.odds[2]}</div>
</div>
</div>`;
});
});
document.getElementById("app").innerHTML=html;
}

function add(team,type,odd){
coupon.push({team,type,odd});
totalOdd*=odd;
update();
}

function update(){
let text="";
coupon.forEach(c=>{
text+=c.team+"-"+c.type+" ";
});
document.getElementById("coupon").innerText=text;
document.getElementById("total").innerText=totalOdd.toFixed(2);
}

function play(){
if(coupon.length==0) return alert("Kupon boş");
let win=Math.random()>0.5;
if(win) alert("Kazandın!");
else alert("Kaybettin");
coupon=[];
totalOdd=1;
update();
}

render();

</script>

</body>
</html>
