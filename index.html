<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mart 2026 Bali Turu</title>

<style>
body{
margin:0;
background:#000;
color:#fff;
font-family:Arial;
overflow:hidden;
}

/* Splash */
#splash{
position:fixed;
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
flex-wrap:wrap;
z-index:9999;
background:#000;
}

/* Letters */
.letter{
font-size:28px;
opacity:0;
position:relative;
display:inline-block;
margin:2px;
animation: drop 0.8s forwards;
}

/* Drop animation */
@keyframes drop{
0%{transform:translateY(-200px);opacity:0;}
80%{transform:translateY(10px);opacity:1;}
100%{transform:translateY(0);}
}

/* Glow effect */
.glow{
text-shadow:0 0 10px currentColor,0 0 20px currentColor;
}

/* Dust effect */
.dust{
position:absolute;
width:6px;
height:6px;
border-radius:50%;
background:white;
animation: dust 0.6s forwards;
}

@keyframes dust{
0%{opacity:1;transform:scale(1);}
100%{opacity:0;transform:scale(3);}
}

/* Hide splash */
.hide{
animation: fadeOut 1s forwards;
animation-delay:3s;
}

@keyframes fadeOut{
to{opacity:0;visibility:hidden;}
}
</style>
</head>

<body>

<div id="splash"></div>

<script>
const text = "Baliye ve Endonezya ya Hoşgeldiniz";
const splash = document.getElementById("splash");

const colors = ["#00ff88","#00c853","#00e5ff","#ffea00","#ff4081"];

text.split("").forEach((char,index)=>{
    let span=document.createElement("span");
    span.innerText=char;
    span.className="letter";
    span.style.animationDelay=(index*0.05)+"s";

    let color = colors[index % colors.length];

    setTimeout(()=>{
        span.style.color=color;
        span.classList.add("glow");

        // dust effect
        let dust=document.createElement("div");
        dust.className="dust";
        dust.style.left="50%";
        dust.style.top="50%";
        span.appendChild(dust);

        setTimeout(()=>dust.remove(),600);

        // glow off after drop
        setTimeout(()=>span.classList.remove("glow"),400);

    },index*50+600);

    splash.appendChild(span);
});

// hide splash
setTimeout(()=>{
    splash.classList.add("hide");
},4000);
</script>

</body>
</html>
