<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BatuBahis Live</title>

<style>
body{margin:0;font-family:Arial;background:#111;color:white;}
.top{background:#0a8f3c;padding:10px;font-weight:bold;}
.tabs{display:flex;background:#1f2937;}
.tabs div{padding:10px;flex:1;text-align:center;}
.active{border-bottom:3px solid yellow;}
.match{background:#e5e7eb;color:black;margin:8px;border-radius:8px;padding:10px;}
.league{background:#374151;color:white;padding:5px;font-size:14px;}
.row{display:flex;justify-content:space-between;align-items:center;}
.odds{display:flex;gap:5px;margin-top:5px;}
.odd{background:#d1d5db;padding:5px 8px;border-radius:5px;font-size:12px;}
.live{color:red;font-size:12px;}
</style>
</head>

<body>

<div class="top">🟢 Canlı Bahis</div>

<div class="tabs">
<div class="active">Futbol</div>
<div>Basketbol</div>
<div>E-Futbol</div>
</div>

<div id="app"></div>

<script>

const data = [
{
league:"İNGİLTERE PREMIER LİG",
matches:[
{home:"Bournemouth",away:"Man United",score:"0-0",time:"27'",odds:[2.79,2.87,1.91]},
]
},
{
league:"İSPANYA LA LIGA",
matches:[
{home:"Villarreal",away:"Sociedad",score:"3-0",time:"25'",odds:[1.5,17.2,17.2]},
]
},
{
league:"İTALYA SERIE A",
matches:[
{home:"Genoa",away:"Udinese",score:"0-0",time:"40'",odds:[1.92,2.03,4.66]},
]
}
];

function render(){
let html="";
data.forEach(l=>{
html+=`<div class="league">${l.league}</div>`;
l.matches.forEach(m=>{
html+=`
<div class="match">
<div class="row">
<div>
<div>${m.home}</div>
<div>${m.away}</div>
</div>
<div>
<b>${m.score}</b><br>
<span class="live">${m.time}</span>
</div>
</div>

<div class="odds">
<div class="odd">1 ${m.odds[0]}</div>
<div class="odd">X ${m.odds[1]}</div>
<div class="odd">2 ${m.odds[2]}</div>
</div>
</div>
`;
});
});
document.getElementById("app").innerHTML=html;
}

render();

</script>

</body>
</html>
