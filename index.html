<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>BatuBahis</title>

<style>
body {
    background:#0f172a;
    color:white;
    font-family:Arial;
    margin:0;
}

header {
    background:#020617;
    padding:15px;
    display:flex;
    justify-content:space-between;
}

.container {
    display:flex;
}

.left {
    width:70%;
    padding:20px;
}

.right {
    width:30%;
    background:#020617;
    padding:20px;
}

.card {
    background:#1e293b;
    padding:15px;
    margin-bottom:10px;
    border-radius:10px;
}

button {
    background:#22c55e;
    border:none;
    padding:6px 10px;
    margin:5px;
    cursor:pointer;
    color:white;
}

input {
    padding:5px;
    margin:5px 0;
}
</style>
</head>

<body>

<header>
    <h2>⚽ BatuBahis</h2>
    <div>
        <input id="user" placeholder="username">
        <input id="pass" placeholder="password" type="password">
        <button onclick="login()">Giriş</button>
    </div>
</header>

<div class="container">

<div class="left">
    <h3>Maçlar</h3>
    <div id="matches"></div>
</div>

<div class="right">
    <h3>Kupon</h3>
    <div id="couponList"></div>

    <hr>

    <div>Toplam Oran: <span id="totalOdd">0</span></div>

    <input id="betAmount" placeholder="Tutar" type="number">

    <button onclick="placeBet()">Bahis Yap</button>
</div>

</div>

<script>
let token = "";
let coupon = [];

async function login(){
    const res = await fetch("http://localhost:3000/login",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            username:document.getElementById("user").value,
            password:document.getElementById("pass").value
        })
    });

    const data = await res.json();
    token = data.token;
    loadMatches();
}

async function loadMatches(){
    const res = await fetch("http://localhost:3000/matches");
    const matches = await res.json();

    let html = "";

    matches.forEach(m=>{
        html += `
        <div class="card">
            <b>${m.home} vs ${m.away}</b><br>
            <button onclick="add('${m._id}','1',${m.odds[0]},'${m.home}')">1 (${m.odds[0]})</button>
            <button onclick="add('${m._id}','X',${m.odds[1]},'Beraberlik')">X (${m.odds[1]})</button>
            <button onclick="add('${m._id}','2',${m.odds[2]},'${m.away}')">2 (${m.odds[2]})</button>
        </div>
        `;
    });

    document.getElementById("matches").innerHTML = html;
}

function add(matchId, pick, odd, team){
    coupon.push({matchId, pick, odd, team});
    renderCoupon();
}

function renderCoupon(){
    let html = "";
    let totalOdd = 1;

    coupon.forEach(c=>{
        html += `<div>${c.team} - ${c.pick} (${c.odd})</div>`;
        totalOdd *= c.odd;
    });

    document.getElementById("couponList").innerHTML = html;
    document.getElementById("totalOdd").innerText = totalOdd.toFixed(2);
}

async function placeBet(){
    let amount = parseFloat(document.getElementById("betAmount").value);

    if(!amount){
        alert("Tutar gir");
        return;
    }

    await fetch("http://localhost:3000/bet",{
        method:"POST",
        headers:{
            "Content-Type":"application/json",
            "Authorization":token
        },
        body:JSON.stringify({
            amount,
            selections:coupon
        })
    });

    alert("Bahis gönderildi");

    coupon = [];
    renderCoupon();
}
</script>

</body>
</html>
